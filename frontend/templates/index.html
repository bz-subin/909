<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daejeon Map</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="map-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="profile-section">
                <div class="avatar">
                    <img src="/static/image/cha.jpg"> <!--static 안으로 바꿔야 한다고 함.-->
                </div>
                <div>
                    <h3 style="font-size: 1rem;">대전 고 (Daejeon Go)</h3>
                    <p style="font-size: 0.75rem; color: var(--text-muted)">대전 여행자</p>
                </div>
            </div>

            <div class="route-section">
                <div class="input-container">
                    <div class="dot-start"></div>
                    <input type="text" id="origin" class="route-input" placeholder="출발지" value="">
                    <!-- 출발지 검색 결과가 표시될 자동완성 목록 컨테이너 -->
                    <div id="origin-results" class="autocomplete-list"></div>
                </div>
                <div class="input-container">
                    <div class="dot-end"></div>
                    <input type="text" id="destination" class="route-input" placeholder="도착지" value="">
                    <!-- 도착지 검색 결과가 표시될 자동완성 목록 컨테이너 -->
                    <div id="destination-results" class="autocomplete-list"></div>
                </div>
                <button class="btn-primary" style="margin-top: 0.5rem;" onclick="searchRoute()">경로 검색 하기 →</button>
            </div>

            <div class="categories-section">
                <div class="section-title">
                    <span>🧭</span> 장소 분류
                </div>
                <button class="category-btn active" onclick="setCategory('전체', this)">📍 전체</button>
                <button class="category-btn" onclick="setCategory('여행지', this)">🏠 여행지</button>
                <button class="category-btn" onclick="setCategory('맛집', this)">🍽️ 맛집</button>
                <button class="category-btn" onclick="setCategory('도서관', this)">📚 도서관</button>
                <button class="category-btn" onclick="setCategory('카페', this)">☕ 카페</button>
                <button class="category-btn" onclick="setCategory('자연/공원', this)">🌲 자연/공원</button>
            </div>

            <div class="stats-section">
                <div class="avatar" style="width: 2.5rem; height: 2.5rem">
                    <img src="/static/image/cha.jpg"> <!--static 안으로 바꿔야 한다고 함.-->
                </div>
                <div>
                    <p style="font-size: 0.875rem; font-weight: 500;">월별 22°C 평일!</p>
                    <p style="font-size: 0.75rem; color: var(--text-muted)">오늘 평일 날씨가 멋져요!<br>대전으로 탐험하러 갈까요? 👍</p>
                </div>
            </div>
        </aside>

        <!-- Map Area -->
        <main class="map-area">
            <div id="map" style="width: 100%; height: 100%;"></div>

            <!-- Custom Place Popup Overlay -->
            <div class="place-popup" id="placePopup">
                <button class="popup-close" onclick="closePopup()">✕</button>
                <img src="" alt="Place" class="popup-img" id="popupImg">
                <h3 style="font-size: 1.25rem; margin-bottom: 0.5rem;" id="popupTitle">Place Name</h3>
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem" id="popupDesc">Description of the place goes here.</p>
                <div style="color: #eab308; margin-bottom: 1rem; font-size: 0.875rem">
                    🔥 4.8
                </div>
                <button class="btn-primary" style="display: flex; gap: 0.5rem; justify-content: center" id="popupLink">
                    커뮤니티로 이동 🔥
                </button>
            </div>

            <!-- Helper Penguin Floating -->
            <div class="helper-penguin">
                    <svg class="penguin-shadow transition-transform duration-500 group-hover:scale-105" width="118" height="137" viewBox="0 0 118 137" xmlns="http://www.w3.org/2000/svg">
                        <path d="M58.8 9.8C36.8 9.8 22.1 29.4 22.1 58.8c0 34.3 9.8 68.6 36.7 68.6s36.7-34.3 36.7-68.6c0-29.4-14.7-49-36.7-49z" fill="#111D21"/>
                        <path d="M58.8 29.4c-14.7 0-22.1 17.2-22.1 39.2 0 29.4 7.4 53.9 22.1 53.9s22.1-24.5 22.1-53.9c0-22.1-7.4-39.2-22.1-39.2z" fill="white"/>
                        <path d="M22.1 63.7C12.3 68.6 7.4 83.3 9.8 93.1c2.5 9.8 14.7-19.6 19.6-29.4m66.2 0c9.8 4.9 14.7 19.6 12.3 29.4-2.5 9.8-14.7-19.6-19.6-29.4" fill="#111D21"/>
                        <circle cx="49" cy="41.7" r="4.9" fill="white"/>
                        <circle cx="68.6" cy="41.7" r="4.9" fill="white"/>
                        <circle cx="50" cy="41.7" r="2.5" fill="#111D21"/>
                        <circle cx="67.6" cy="41.7" r="2.5" fill="#111D21"/>
                        <path d="M54.9 51.5L58.8 58.8l3.9-7.3c0 0-3.9-1.5-7.8 0z" fill="#2C2C2C"/>
                        <path d="M56.4 52.9l2.4 3.4 2.5-3.4" fill="#FF8C42" opacity="0.8"/>
                        <path d="M49 125c-7.4 0-9.8 4.9-7.4 7.4h9.8V125zm19.6 0c7.4 0 9.8 4.9 7.4 7.4H66.2V125z" fill="#2C2C2C"/>
                    </svg>
                <div style="position: absolute; top: -3.5rem; right: 0; background: white; padding: 0.5rem 1rem; border-radius: 0.75rem; box-shadow: var(--shadow-md); white-space: nowrap">
                    <p style="font-size: 0.875rem; font-weight: 500"></p>
                </div>
                <div class="pulse-badge">🔥</div>
            </div>
        </main>
    </div>

    <!-- Kakao Map and related scripts -->
    <!-- map.js, category.js, navigation.js 스크립트는 로드 순서가 중요합니다. -->
    <!-- map.js가 Kakao Maps API를 로드하고 initializeNavigation을 호출하므로 가장 먼저 로드되어야 합니다. -->
    <script src="/static/js/map.js"></script>
    <script src="/static/js/category.js"></script>
    <script src="/static/js/navigation.js"></script>
    <script>
        // Kakao Map 연결 함수를 직접 호출하여 초기화 과정을 시작합니다.
        // 이 함수 내에서 Kakao Maps API 및 필요한 서비스(`services`)가 로드된 후,
        // `initializeNavigation()` 함수가 호출되어 검색 자동 완성 및 경로 관련 이벤트 리스너가 설정됩니다.
        connectKakaomap();
    </script>
</body>
</html>
