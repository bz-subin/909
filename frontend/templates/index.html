<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="keywords" content="대전 여행, 대전 맛집, 대전 카페, 대전 관광, 대전 지도, 대전 경로, 펭귄, PenPing, 대전 추천 장소">
    <meta name="author" content="Daejeon Go">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://909-d5r.pages.dev/">
    <meta property="og:title" content="PenPing - 대전 여행 길찾기 지도">
    <meta property="og:description" content="대전의 맛집, 카페, 여행지, 공원을 한눈에! 경로 주변 장소를 자동으로 추천해드립니다.">
    <meta property="og:image" content="/frontend/static/image/og_image.png">
    <meta property="og:site_name" content="PenPing">

    <title>PenPing</title>
    <link rel="icon" href="../static/image/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .penguin-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            position: relative;
            display: block; /* Ensures the button wraps the SVG correctly */
        }

        .penguin-waddle {
            animation: waddle 0.8s ease-in-out;
        }

        @keyframes waddle {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(-15deg);
            }
            75% {
                transform: rotate(15deg);
            }
        }
    </style>
</head>
<body>
    <div class="map-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="profile-section" style="justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div class="avatar">
                        <img src="/static/image/cha.jpg"> <!--static 안으로 바꿔야 한다고 함.-->
                    </div>
                    <div>
                        <h3 style="font-size: 1rem;">대전 고 (Daejeon Go)</h3>
                        <p style="font-size: 0.75rem; color: var(--text-muted)">대전 여행자</p>
                    </div>
                </div>
                <button onclick="logout()" style="background: none; border: 1px solid var(--primary); color: var(--primary); padding: 0.25rem 0.5rem; border-radius: 0.5rem; font-size: 0.75rem; cursor: pointer; transition: all 0.2s;">로그아웃</button>
            </div>

            <div class="route-section">
                <div class="input-container">
                    <div class="dot-start"></div>
                    <input type="text" id="origin" class="route-input" placeholder="출발지" value="">
                    <!-- 출발지 검색 결과가 표시될 자동완성 목록 컨테이너 -->
                    <div id="origin-results" class="autocomplete-list"></div>
                </div>
                <div class="input-container">
                    <div class="dot-end"></div>
                    <input type="text" id="destination" class="route-input" placeholder="도착지" value="">
                    <!-- 도착지 검색 결과가 표시될 자동완성 목록 컨테이너 -->
                    <div id="destination-results" class="autocomplete-list"></div>
                </div>
                <button class="btn-primary" style="margin-top: 0.5rem;" onclick="searchRoute()">경로 검색 하기 →</button>
            </div>

            <div class="categories-section">
                <div class="section-title">
                    <span>🧭</span> 장소 분류
                </div>
                <button class="category-btn active" onclick="setCategory('전체', this)">📍 전체</button>
                <button class="category-btn" onclick="setCategory('여행지', this)">🏠 여행지</button>
                <button class="category-btn" onclick="setCategory('맛집', this)">🍽️ 맛집</button>
                <button class="category-btn" onclick="setCategory('도서관', this)">📚 도서관</button>
                <button class="category-btn" onclick="setCategory('카페', this)">☕ 카페</button>
                <button class="category-btn" onclick="setCategory('자연/공원', this)">🌲 자연/공원</button>
            </div>

            <div class="stats-section">
                <div class="avatar" style="width: 2.5rem; height: 2.5rem; font-size: 2rem; display: flex; align-items: center; justify-content: center;">
                    <span class="weather-emoji">⏳</span>
                </div>
                <div>
                    <p class="weather-title" style="font-size: 0.875rem; font-weight: 500;">날씨 로딩 중...</p>
                    
                    <p class="weather-desc" style="font-size: 0.75rem; color: var(--text-muted)">잠시만 기다려주세요!<br>대전 날씨를 확인하고 있어요. 🐧</p>
                </div>
            </div>
        </aside>

        <!-- Map Area -->
        <main class="map-area">
            <div id="map" style="width: 100%; height: 100%;"></div>

            <!-- Custom Place Popup Overlay -->
            <div class="place-popup" id="placePopup">
                <button class="popup-close" onclick="closePopup()">✕</button>
                <img src="" alt="Place" class="popup-img" id="popupImg">
                <h3 style="font-size: 1.25rem; margin-bottom: 0.5rem;" id="popupTitle">Place Name</h3>
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem" id="popupDesc">Description of the place goes here.</p>
                <div style="color: #eab308; margin-bottom: 1rem; font-size: 0.875rem">
                    🔥 4.8
                </div>
                <button class="btn-primary" style="display: flex; gap: 0.5rem; justify-content: center" id="popupLink">
                    커뮤니티로 이동 🔥
                </button>
            </div>

            <!-- Helper Penguin Floating -->
            <div class="helper-penguin">
                <button class="penguin-button" id="penguinButton">
                    <svg class="penguin-shadow transition-transform duration-500 group-hover:scale-105" width="118" height="137" viewBox="0 0 118 137" xmlns="http://www.w3.org/2000/svg">
                        <path d="M58.8 9.8C36.8 9.8 22.1 29.4 22.1 58.8c0 34.3 9.8 68.6 36.7 68.6s36.7-34.3 36.7-68.6c0-29.4-14.7-49-36.7-49z" fill="#111D21"/>
                        <path d="M58.8 29.4c-14.7 0-22.1 17.2-22.1 39.2 0 29.4 7.4 53.9 22.1 53.9s22.1-24.5 22.1-53.9c0-22.1-7.4-39.2-22.1-39.2z" fill="white"/>
                        <path d="M22.1 63.7C12.3 68.6 7.4 83.3 9.8 93.1c2.5 9.8 14.7-19.6 19.6-29.4m66.2 0c9.8 4.9 14.7 19.6 12.3 29.4-2.5 9.8-14.7-19.6-19.6-29.4" fill="#111D21"/>
                        <circle cx="49" cy="41.7" r="4.9" fill="white"/>
                        <circle cx="68.6" cy="41.7" r="4.9" fill="white"/>
                        <circle cx="50" cy="41.7" r="2.5" fill="#111D21"/>
                        <circle cx="67.6" cy="41.7" r="2.5" fill="#111D21"/>
                        <path d="M54.9 51.5L58.8 58.8l3.9-7.3c0 0-3.9-1.5-7.8 0z" fill="#2C2C2C"/>
                        <path d="M56.4 52.9l2.4 3.4 2.5-3.4" fill="#FF8C42" opacity="0.8"/>
                        <path d="M49 125c-7.4 0-9.8 4.9-7.4 7.4h9.8V125zm19.6 0c7.4 0 9.8 4.9 7.4 7.4H66.2V125z" fill="#2C2C2C"/>
                    </svg>
                </button>
                <div id="penguin-speech-bubble" style="position: absolute; top: -3.5rem; right: 0; background: white; padding: 0.5rem 1rem; border-radius: 0.75rem; box-shadow: var(--shadow-md); white-space: nowrap; opacity: 0; transition: opacity 0.3s ease-in-out;">
                    <p id="penguin-speech" style="font-size: 0.875rem; font-weight: 500"></p>
                </div>
            </div>
        </main>
    </div>

    <!-- Kakao Map and related scripts -->
    <!-- map.js, category.js, navigation.js 스크립트는 로드 순서가 중요합니다. -->
    <!-- map.js가 Kakao Maps API를 로드하고 initializeNavigation을 호출하므로 가장 먼저 로드되어야 합니다. -->
    <script src="/static/js/map.js"></script>
    <script src="/static/js/category.js"></script>
    <script src="/static/js/navigation.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/weather.js"></script>
    <script>
        // Kakao Map 연결 함수를 직접 호출하여 초기화 과정을 시작합니다.
        // 이 함수 내에서 Kakao Maps API 및 필요한 서비스(`services`)가 로드된 후,
        // `initializeNavigation()` 함수가 호출되어 검색 자동 완성 및 경로 관련 이벤트 리스너가 설정됩니다.
        connectKakaomap();
        // [주석: 백엔드에서 넘겨준 카카오 API 키를 JS 변수로 저장]

        const kakaoKey = "{{ kakao_key }}";
        window.KAKAO_REST_API = kakaoKey;
        connectKakaomap(); // 키를 먼저 세팅하고 호출!
    </script>

            "내 털은 만져보면 생각보다 단단하고 빳빳해.",
            "우린 빙하 위에서 미끄럼 타는 게 제일 재밌어.",
            "남극의 눈은 아주 깨끗해서 가끔 먹기도 해.",
            "펭귄은 무리를 지어 사냥하면 더 효율적이야.",
            "내 부리 안쪽엔 가시 같은 게 있어서 물고기를 놓치지 않아.",
            "우린 추울 때 날개 아래에 부리를 파묻고 자.",
            "펭귄의 귀는 깃털에 가려져서 안 보이지만 잘 들어.",
            "내 목소리는 생각보다 우렁차서 깜짝 놀랄걸?",
            "가끔은 사람처럼 앉아서 쉬기도 해.",
            "오월드 버드랜드 펭귄들 중에서 내가 제일 귀여운 건 비밀이야.",
            "나랑 눈 마주치면 복이 온다는 전설이 있어. 내가 방금 지어냈어!",
            "이제 다 읽었으면 진짜 오월드 올 거지? 펭귄은 거짓말 안 좋아해!"
        ];

        let speechTimeout;

        penguinButton.addEventListener('click', () => {
            // --- Animation Logic ---
            if (!penguinSvg.classList.contains('penguin-waddle')) {
                penguinSvg.classList.add('penguin-waddle');
                penguinSvg.addEventListener('animationend', () => {
                    penguinSvg.classList.remove('penguin-waddle');
                }, { once: true });
            }

            // --- Speech Bubble Logic ---
            // 1. Select a random phrase
            const randomIndex = Math.floor(Math.random() * phrases.length);
            const randomPhrase = phrases[randomIndex];
            
            // 2. Update the speech bubble content
            penguinSpeech.textContent = randomPhrase;

            // 3. Make the bubble visible
            speechBubble.style.opacity = '1';

            // 4. Hide the bubble after a few seconds
            clearTimeout(speechTimeout); // Clear any existing timer
            speechTimeout = setTimeout(() => {
                speechBubble.style.opacity = '0';
            }, 4000); // Hide after 4 seconds
        });
    </script>
    <script>
        // Supabase 설정 전달
        window.SUPABASE_URL = "{{ supabase_url }}";
        window.SUPABASE_KEY = "{{ supabase_key }}";
    </script>
    
</body>
</html>
