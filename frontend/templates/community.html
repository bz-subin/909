<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daejeon Community - {{ place_name }}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <style>
        /* --- [스타일 정의] --- */
        
        /* 모달 및 추가 스타일 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white; padding: 2rem; border-radius: 1rem;
            width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none !important; }
        .post-card { cursor: pointer; border: 1px solid #e2e8f0; padding: 1.5rem; margin-bottom: 1rem; border-radius: 0.5rem; background: #fff; }
        .post-card img { max-width: 100%; height: auto; margin-top: 10px; border-radius: 8px; }
        
        /* 폼 스타일 */
        .input-group { margin-bottom: 1rem; }
        .input-group input[type="text"], .input-group textarea {
            width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.5rem;
        }
        /* 로딩 바 */
        #progress-bar {
            position: fixed; top: 0; left: 0; height: 4px; background-color: #0ea5e9; 
            width: 0%; transition: width 0.3s; z-index: 2000;
        }
    </style>
</head>

<body class="bg-gray-50">
    <!-- 로딩 상태 표시 바 -->
    <div id="progress-bar"></div>

    <!--헤더-->
    <header class="community-header">
        <div class="header-inner">
            <div class="header-left">
                
                <button class="back-btn" onclick="window.location.href='/map'">
                    <img src="/static/images/펭귄 이미지.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/64'">
                </button>

                <h1 style="font-size: 1.25rem;">{{ place_name }}</h1> 
            </div>
            <div>
                <!-- 글 작성 모달 열기 버튼 -->
                <button class="btn-primary" id="btn-open-write">게시글 작성</button>
            </div>
        </div>
    </header>


    <div class="community-layout">
        <main class="main-content">

            <div class="top-bar"> <!-- 검색 및 탭 영역 -->
                <div class="search-wrapper">   <!--검색창-->
                    <span class="search-icon">🔍</span> 
                    <input type="text" placeholder="대전의 편의 위치 추천해 슈퍼미 모두같은 명소를 찾고싶어요">
                </div>

                <div class="tabs">   <!--검색창 밑 버튼(전체, 추천순, 최신, 리뷰, 사진)-->
                    <button class="tab active">전체</button>
                    <button class="tab">추천순</button>
                    <button class="tab">최신</button>
                    <button class="tab">리뷰</button>
                    <button class="tab">사진</button>
                </div>
            </div>

            <!-- [게시글 목록 영역] JS로 데이터가 로드되면 이곳에 카드가 추가됩니다 -->
            <div class="post-list" id="postList"></div>
            </div>
        </main>


        <aside class="right-sidebar"> <!-- 인기 장소-->

            <div class="widget">
                <div class="widget-title">
                    <span style="color: #f97316;">📈</span> 내 주변 인기 장소
                </div>

                <div class="popular-place"> <!--피드-->
                    <div class="rank">01</div>
                    <div>
                        <h4 style="font-size: 0.875rem;">판암수족관</h4>
                        <p style="font-size: 0.75rem; color: var(--text-muted);">오늘 1,267 건</p>  <!--TODO. 조회수 구하는 로직 필요-->
                    </div>
                </div>

                <div class="popular-place">
                    <div class="rank">02</div>
                    <div>
                        <h4 style="font-size: 0.875rem;">스마더프로 쇼핑</h4>
                        <p style="font-size: 0.75rem; color: var(--text-muted);">오늘 982건씩</p> 
                    </div>
                </div>

                <div class="popular-place">
                    <div class="rank">03</div>
                    <div>
                        <h4 style="font-size: 0.875rem;">류성준탑</h4>
                        <p style="font-size: 0.75rem; color: var(--text-muted);">오늘 620건험장</p>
                    </div>
                </div>
            </div>

            <div class="widget fancy-widget" style="position: relative; overflow: hidden">  <!--css-->
                <div style="display: flex; gap: 1rem; align-items: flex-start;">

        </aside>
    </div>


    <!-- [통합 모달] 작성(Create), 상세(Read), 수정(Update) 기능을 하나의 모달에서 처리 -->
    <div id="div_modal" class="modal-overlay">
        <div class="modal-box">
            
            <!-- 1. 작성 모드 영역 -->
            <div id="write-section" class="hidden">
                <h3>게시글 작성</h3>
                <div class="input-group">
                    <input type="text" id="input_title" placeholder="제목">
                </div>
                <div class="input-group">
                    <textarea id="input_content" rows="4" placeholder="내용"></textarea>
                </div>
                <div class="input-group">
                    <input type="file" id="input_file" accept="image/*">
                </div>
                <div class="btn-group">
                    <button id="btn-write-save" class="btn btn-primary">저장</button>
                    <button class="btn btn-secondary btn-close-modal">닫기</button>
                </div>
            </div>

            <!-- 2. 상세 보기 모드 영역 -->
            <div id="view-section" class="hidden">
                <h3 id="view_title"></h3>
                <div id="view_img_area" style="margin-bottom: 1rem;"></div>
                <p id="view_content" style="white-space: pre-wrap; color: #334155;"></p>
                <div class="btn-group">
                    <button id="btn-to-edit" class="btn btn-primary hidden">수정</button>
                    <button class="btn btn-secondary btn-close-modal">닫기</button>
                </div>
            </div>

            <!-- 3. 수정 모드 영역 -->
            <div id="edit-section" class="hidden">
                <h3>게시글 수정</h3>
                <div class="input-group">
                    <label>제목</label>
                    <input type="text" id="edit_title">
                </div>
                <div class="input-group">
                    <label>내용</label>
                    <textarea id="edit_content" rows="4"></textarea>
                </div>
                <div class="input-group">
                    <label>사진 변경</label>
                    <input type="file" id="edit_file" accept="image/*">
                    <p style="font-size: 0.8rem; color: #64748b;">파일 선택 시 기존 이미지가 삭제되고 교체됩니다.</p>
                </div>
                <div class="btn-group">
                    <button id="btn-edit-save" class="btn btn-primary">수정 저장</button>
                    <button id="btn-edit-cancel" class="btn btn-secondary">수정 취소</button>
                </div>
            </div>

        </div>
    </div>


    <script> 
        // ==========================================
        // [JavaScript] CSR 로직 및 이벤트 핸들러
        // ==========================================

        // TODO: 본인의 Supabase 설정으로 교체하세요.
        const SUPABASE_URL = 'https://YOUR_SUPABASE_PROJECT.supabase.co'; // 프로젝트 URL
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY'; // 익명 키
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let all_feed = [];
        let selected_feed = null;
        let login_user_id = null;
        let is_loading = false;

        const div_feed_list = document.getElementById('postList');
        const div_modal = document.getElementById('div_modal');
        const progressBar = document.getElementById('progress-bar');

        // --- [초기화] DOM 로드 시 로그인 체크 및 데이터 로딩 ---
        window.addEventListener('DOMContentLoaded', async () => {
            // 로그인 체크 (localStorage 사용 시뮬레이션)
            const storedUser = localStorage.getItem('login_user_id');
            if (!storedUser) {
                alert("로그인이 필요합니다."); 
                window.location.href = "/"; // 로그인 페이지 리다이렉트
                return;
            }
            login_user_id = storedUser;
            console.log("Logged in user:", login_user_id);

            // 전체 피드 불러오기
            await fetchAllFeeds();
        });

        // --- [조회] 서버에서 전체 게시글 불러오기 (GET) ---
        async function fetchAllFeeds() {
            setLoading(true);
            try {
                const res = await fetch('/get_data');
                all_feed = await res.json();
                renderFeedList();
            } catch (err) {
                console.error(err);
                div_feed_list.innerHTML = "피드를 불러오는데 실패했습니다.";
            } finally {
                setLoading(false);
            }
        }

        // 불러온 데이터로 화면 그리기
        function renderFeedList() {
            div_feed_list.innerHTML = '';
            if (all_feed.length === 0) {
                div_feed_list.innerHTML = '<p>게시글이 없습니다.</p>';
                return;
            }
            // 최신순 정렬 (ID 기준 역순 가정)
            const sortedFeeds = [...all_feed].sort((a, b) => b.id - a.id);
            sortedFeeds.forEach(feed => {
                const feedCard = createFeedCard(feed);
                div_feed_list.appendChild(feedCard);
            });
        }

        // 개별 게시글 카드 DOM 생성 함수
        function createFeedCard(feed) {
            const div = document.createElement('div');
            div.className = 'post-card';
            div.id = `feed-${feed.id}`;
            
            // 내용 앞 20자 substring
            const shortContent = feed.content.length > 20 ? feed.content.substring(0, 20) + '...' : feed.content;

            // 이미지가 있으면 태그 생성
            let imgTag = '';
            if (feed.image_url) {
                imgTag = `<img src="${feed.image_url}" alt="image">`;
            }

            div.innerHTML = `
                <h3>${feed.title}</h3>
                <p>${shortContent}</p>
                ${imgTag}
            `;

            // 카드 클릭 시 상세 모달 열기 이벤트 연결
            div.addEventListener('click', () => openDetailModal(feed));
            return div;
        }

        // --- [작성] 게시글 작성 모달 열기 및 저장 (POST) ---
        document.getElementById('btn-open-write').addEventListener('click', () => {
            div_modal.classList.add('show');
            // 작성 영역만 표시하고 나머지는 숨김
            document.getElementById('write-section').classList.remove('hidden');
            document.getElementById('view-section').classList.add('hidden');
            document.getElementById('edit-section').classList.add('hidden');
            
            // 초기화
            document.getElementById('input_title').value = '';
            document.getElementById('input_content').value = '';
            document.getElementById('input_file').value = '';
        });

        // 저장 버튼 클릭 시
        document.getElementById('btn-write-save').addEventListener('click', async () => {
            const title = document.getElementById('input_title').value;
            const content = document.getElementById('input_content').value;
            const fileInput = document.getElementById('input_file');
            const file = fileInput.files[0];

            if(!title || !content) return alert("제목과 내용을 입력하세요.");

            setLoading(true);
            try {
                let input_img_url = null;
                // 1. 파일이 있다면 Supabase Storage에 업로드
                if (file) {
                    const fileName = `feed/${Date.now()}_${file.name}`;
                    const { data, error } = await supabaseClient.storage.from('images').upload(fileName, file);
                    if (error) throw error;
                    // Public URL 가져오기
                    const { data: publicUrlData } = supabaseClient.storage.from('images').getPublicUrl(fileName);
                    input_img_url = publicUrlData.publicUrl;
                }

                // 2. FastAPI 서버로 게시글 데이터 전송 (POST)
                const res = await fetch('/user_input', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title: title,
                        content: content,
                        user_id: login_user_id,
                        image_url: input_img_url
                    })
                });
                if(!res.ok) throw new Error("저장 실패");
                
                const newFeed = await res.json();

                // 3. 화면 즉시 갱신 (서버 재요청 없이 리스트 맨 앞에 추가)
                all_feed.push(newFeed);
                const newCard = createFeedCard(newFeed);
                div_feed_list.prepend(newCard); // 맨 앞에 추가
                
                closeModal();

            } catch (err) {
                console.error(err);
                alert("오류 발생: " + err.message);
            } finally {
                setLoading(false);
            }
        });

        // --- [상세보기] 게시글 상세 모달 열기 ---
        function openDetailModal(feed) {
            selected_feed = feed;
            div_modal.classList.add('show');
            
            // 상세보기 영역 표시
            const viewSec = document.getElementById('view-section');
            viewSec.classList.remove('hidden');
            document.getElementById('write-section').classList.add('hidden');
            document.getElementById('edit-section').classList.add('hidden');

            document.getElementById('view_title').innerText = feed.title;
            document.getElementById('view_content').innerText = feed.content;
            
            const imgArea = document.getElementById('view_img_area');
            imgArea.innerHTML = feed.image_url ? `<img src="${feed.image_url}" style="max-width:100%; border-radius:8px;">` : '';

            // 작성자 본인 확인 (로그인된 ID와 게시글 작성자 ID 비교)
            const btnEdit = document.getElementById('btn-to-edit');
            // user_id 비교 (문자열 변환하여 비교)
            if (String(feed.user_id) === String(login_user_id)) {
                btnEdit.classList.remove('hidden');
            } else {
                btnEdit.classList.add('hidden');
            }
        }

        // --- [수정] 게시글 수정 모드 진입 및 저장 (PATCH) ---
        document.getElementById('btn-to-edit').addEventListener('click', () => {
            document.getElementById('view-section').classList.add('hidden');
            document.getElementById('edit-section').classList.remove('hidden');

            // 초기값 세팅
            document.getElementById('edit_title').value = selected_feed.title;
            document.getElementById('edit_content').value = selected_feed.content;
            document.getElementById('edit_file').value = '';
        });

        // 수정 취소 (상세보기로 복귀)
        document.getElementById('btn-edit-cancel').addEventListener('click', () => {
            document.getElementById('edit-section').classList.add('hidden');
            document.getElementById('view-section').classList.remove('hidden');
        });

        // 수정 완료 저장
        document.getElementById('btn-edit-save').addEventListener('click', async () => {
            const newTitle = document.getElementById('edit_title').value;
            const newContent = document.getElementById('edit_content').value;
            const newFile = document.getElementById('edit_file').files[0];

            setLoading(true);
            try {
                let edit_img_url = selected_feed.image_url;

                // 1. 파일이 변경되었다면: 기존 이미지 삭제 후 새 이미지 업로드
                if (newFile) {
                    // 기존 이미지가 있다면 삭제 시도 (선택 사항, 에러 무시)
                    if (selected_feed.image_url) {
                        try {
                            const oldPath = selected_feed.image_url.split('/public/images/')[1]; // URL 구조에 따라 파싱 필요
                            if(oldPath) {
                                // URL 디코딩 필요할 수 있음
                                const decodedPath = decodeURIComponent(oldPath);
                                await supabaseClient.storage.from('images').remove([decodedPath]);
                            }
                        } catch(e) { console.log("기존 이미지 삭제 실패/무시", e); }
                    }
                    
                    // 새 파일 업로드
                    const fileName = `feed/${Date.now()}_updated_${newFile.name}`;
                    const { error } = await supabaseClient.storage.from('images').upload(fileName, newFile);
                    if (error) throw error;
                    const { data: urlData } = supabaseClient.storage.from('images').getPublicUrl(fileName);
                    edit_img_url = urlData.publicUrl;
                }

                // 2. 서버에 수정 요청 (PATCH)
                const res = await fetch(`/feed/${selected_feed.id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title: newTitle,
                        content: newContent,
                        image_url: edit_img_url
                    })
                });
                if(!res.ok) throw new Error("수정 실패");

                const updatedFeed = await res.json();

                // 3. 클라이언트 데이터 및 UI 즉시 갱신
                selected_feed = updatedFeed; // 현재 선택된 피드 갱신
                
                // 목록(div_feed_list) 내 해당 카드 갱신
                const oldCard = document.getElementById(`feed-${updatedFeed.id}`);
                if (oldCard) {
                    const newCard = createFeedCard(updatedFeed);
                    div_feed_list.replaceChild(newCard, oldCard);
                }
                
                // 모달 상세 뷰 갱신 후 복귀
                openDetailModal(updatedFeed);

            } catch (err) {
                console.error(err);
                alert("수정 중 오류 발생");
            } finally {
                setLoading(false);
            }
        });

        // --- [공통] 모달 닫기 및 로딩 바 함수 ---
        document.querySelectorAll('.btn-close-modal').forEach(btn => {
            btn.addEventListener('click', closeModal);
        });

        function closeModal() {
            div_modal.classList.remove('show');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                progressBar.style.width = '90%';
            } else {
                progressBar.style.width = '100%';
                setTimeout(() => { progressBar.style.width = '0%'; }, 300);
            }
        }

        // 모달 외부 클릭 시 닫기
        window.addEventListener('click', (e) => {
            if (e.target === div_modal) {
                closeModal();
            }
        });

        // [참고] 테스트용: 로그인 로직이 없을 때 강제로 ID 설정하는 코드
        // 실제 서비스 연동 시에는 상단의 DOMContentLoaded 로직을 사용하고 이 부분은 삭제해야 함
        window.addEventListener('DOMContentLoaded', async () => {
            // 중복 실행 방지를 위해 실제 동작 코드는 주석 처리하거나,
            // 테스트 환경에서만 login_user_id를 강제로 주입하도록 사용
            if (!localStorage.getItem('login_user_id')) {
                console.log("테스트 모드: 임시 ID 할당");
                login_user_id = "임시_테스트_UUID";
                await fetchAllFeeds();
            }
        });

    </script>

    <!-- Supabase JS 라이브러리 (헤더 또는 바디 끝에 위치) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
