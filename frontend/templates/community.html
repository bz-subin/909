<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="대전의 맛집, 카페, 여행지, 공원을 한눈에! 출발지와 도착지를 입력하면 경로 주변의 장소를 자동으로 추천해드립니다.">
    <meta name="keywords" content="대전 여행, 대전 맛집, 대전 카페, 대전 관광, 대전 지도, 대전 경로, 펭귄, PenPing, 대전 추천 장소">
    <meta name="author" content="Daejeon Go">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://909-d5r.pages.dev/">
    <meta property="og:title" content="PenPing - 대전 여행 길찾기 지도">
    <meta property="og:description" content="대전의 맛집, 카페, 여행지, 공원을 한눈에! 경로 주변 장소를 자동으로 추천해드립니다.">
    <meta property="og:image" content="/frontend/static/image/og_image.png">
    <meta property="og:site_name" content="PenPing">

    <title>PenPing</title>  
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/community.css">
    <link rel="icon" href="../static/image/favicon.ico" type="image/x-icon">
    
    <style>
        /* 모달 닫기 버튼 오른쪽 상단 이동 스타일 */
        #view-section {
            position: relative; /* 버튼 절대 위치 기준점 */
            padding-top: 2rem; /* 버튼 공간 확보 */
        }
        .btn-close-top-right {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
            transition: color 0.2s;
        }
        .btn-close-top-right:hover {
            color: #ef4444;
        }
    </style>
</head>

<body class="bg-gray-50">

    <!--헤더-->
    <header class="community-header">
        <div class="header-inner">
            <div class="header-left">
                
                <!--상단 로고(이미지) 클릭 시 /map으로 이동-->
                <button class="back-btn" onclick="window.location.href='/map'">  
                    <img src="/static/image/cha.jpg"> <!--static 안으로 바꿔야 한다고 함.-->
                </button>

                <h1 id="header-title" style="font-size: 1.25rem;">{{ place_name }}</h1>  <!--*플레이스 이름-->

                <select id="category-filter">  <!--카테고리 select 추가-->
                    <option value="">전체</option>
                    <option value="음식">음식</option>
                    <option value="영화">영화</option>
                    <option value="문화">문화</option>
                    <option value="쇼핑">쇼핑</option>
                </select>

            </div>

            <div>
                <button class="btn-primary" id="btn-open-write">게시글 작성</button> <!--!!!!  게시글 작성-->
            </div>

        </div>
    </header>


    <div class="community-layout">
        <main class="main-content">
            <div class="top-bar"> <!-- 검색 및 탭 영역 -->
                <div class="tabs">   <!--검색창 밑 버튼(전체, 추천순, 최신, 리뷰, 사진)-->
                    

                    <div class="feed-divs" id="feed-div">
                        <!--! 피드 추가될 부분 -->
                    </div>

                    <aside class="right-sidebar"> <!-- 인기 장소-->

                        <div class="widget">
                            <div class="widget-title">
                                <h4 style="color: #000000;">내 주변 인기 장소</h4> 
                            </div>

                            <div class="popular-place"> <!--장소 1위-->
                                <div class="rank">01</div>
                                <div>
                                    <h4 style="font-size: 0.875rem;">판암수족관</h4>
                                    <p style="font-size: 0.75rem; color: var(--text-muted);">오늘 1,267 건</p>  <!--TODO. 조회수 구하는 로직 필요-->
                                </div>
                            </div>

                            <div class="popular-place"> <!--장소 2위-->
                                <div class="rank">02</div>
                                <div>
                                    <h4 style="font-size: 0.875rem;">스마더프로 쇼핑</h4>
                                    <p style="font-size: 0.75rem; color: var(--text-muted);">오늘 982건씩</p> 
                                </div>
                            </div>

                            <div class="popular-place"> <!--장소 3위-->
                                <div class="rank">03</div>
                                <div>
                                    <h4 style="font-size: 0.875rem;">류성준탑</h4>
                                    <p style="font-size: 0.75rem; color: var(--text-muted);">오늘 620건험장</p>
                                </div>
                            </div>
                        </div>

                    </aside>

                </div>
            </div>
        </main>
    </div>

    <!--* 게시글 작성 버튼 클릭 시 '모달' 작성, 상세(Read), 수정 -->
    <div id="write-div-modal" class="modal-overlay">
        <div class="modal-box">
            
            <!-- 게시글 작성 모달 -->
            <div id="write-section" class="hidden">
                <h3>게시글 작성</h3>

                <div class="input-group">
                    <input type="text" id="input_title" placeholder="제목">  <!--*제목-->
                </div>
                <div class="input-group">
                    <textarea id="input_content" rows="4" placeholder="내용"></textarea> <!--*내용-->
                </div>
                <div class="input-group">
                    <input type="file" id="input-file" accept="image/*"> <!--*이미지-->
                    <div id = "preview-img"></div> <!--!이미지 미리보기 영역 추가-->
                </div>
                <div class="btn-group">
                    <button id="btn-write-save" class="btn btn-primary">저장</button>  <!--*저장-->
                    <button class="btn btn-secondary btn-close-modal">닫기</button>  <!--*닫기-->
                </div>
            </div>

            <!-- 상세 보기 모달 -->
            <div id="view-section" class="hidden">
                <h3 id="view_title"></h3>
                <div id="view_img_area" style="margin-bottom: 1rem;"></div>
                <p id="view_content" style="white-space: pre-wrap; color: #334155;"></p>
                <div class="btn-group">
                    <button id="btn-to-edit" class="btn btn-primary hidden">수정</button>
                    <button class="btn btn-secondary btn-close-modal">닫기</button>
                </div>

                <!-- 댓글 영역 -->
                <div class="comment-section" style="margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1rem;">
                    <h4 style="font-size: 1rem; margin-bottom: 1rem;">댓글</h4>
                    
                    <!-- 댓글 목록 -->
                    <div id="comment-list" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; max-height: 300px; overflow-y: auto;">
                        <!-- JS로 댓글 렌더링 -->
                    </div>

                    <!-- 댓글 작성 폼 -->
                    <div class="comment-form">
                        <textarea id="comment_input" rows="2" placeholder="댓글을 남겨보세요..." style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; margin-bottom: 0.5rem;"></textarea>
                        <button id="btn-save-comment" class="btn btn-primary" style="width: 100%;">댓글 등록</button>
                    </div>
                </div>
            </div>

            <!-- 수정 모달 -->
            <div id="edit-section" class="hidden">
                <h3>게시글 수정</h3>
                <div class="input-group">
                    <label>제목</label>
                    <input type="text" id="edit_title">
                </div>
                <div class="input-group">
                    <label>내용</label>
                    <textarea id="edit_content" rows="4"></textarea>
                </div>
                <div class="input-group">
                    <label>사진 변경</label>
                    <input type="file" id="edit_file" accept="image/*">
                    <p style="font-size: 0.8rem; color: #64748b;">파일 선택 시 기존 이미지가 삭제되고 교체됩니다.</p>
                </div>
                <div class="btn-group">
                    <button id="btn-edit-save" class="btn btn-primary">수정 저장</button>
                    <button id="btn-edit-cancel" class="btn btn-secondary">수정 취소</button>
                </div>
            </div>

        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/js/navigation.js"></script>

    <script> //py에서 받은 키값을 js에서 쓸 수 있게 전역 변수처리
        window.SUPABASE_URL = "{{ supabase_url }}";
        window.SUPABASE_KEY = "{{ supabase_key }}";
    </script>
    <script src="/static/js/community.js" type="module"></script> <!--*js 로직 분리-->

</body>
</html>
