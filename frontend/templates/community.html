<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daejeon Community - {{ place_name }}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body class="bg-gray-50">

    <!--헤더더-->
    <header class="community-header">
        <div class="header-inner">
            <div class="header-left">
                
                <button class="back-btn" onclick="window.location.href='/map'">
                    <img src="/static/images/펭귄 이미지.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/64'">
                </button>

                <h1 style="font-size: 1.25rem;">{{ place_name }}</h1> 
            </div>
            <div>
                <form>
                    <button class="btn-primary" style="padding: 0.5rem 1rem;">게시글 작성</button>
                </form>
            </div>
        </div>
    </header>


    <div class="community-layout">
        <main class="main-content">

            <div class="top-bar">
                <div class="search-wrapper">   <!--검색창-->
                    <span class="search-icon">🔍</span> 
                    <input type="text" placeholder="대전의 편의 위치 추천해 슈퍼미 모두같은 명소를 찾고싶어요">
                </div>

                <div class="tabs">   <!--검색창 밑 버튼(전체, 추천순, 최신, 리뷰, 사진)-->
                    <button class="tab active">전체</button>
                    <button class="tab">추천순</button>
                    <button class="tab">최신</button>
                    <button class="tab">리뷰</button>
                    <button class="tab">사진</button>
                </div>
            </div>

            <div class="post-list" id="postList">
                <!-- js로 뭔가 넣는듯 -->
            </div>
        </main>


        <aside class="right-sidebar"> <!-- 인기 장소-->

            <div id="write-modal">
            <!--js 들어갈 예정-->
            </div>

            <div class="widget">
                <div class="widget-title">
                    <span style="color: #f97316;">📈</span> 내 주변 인기 장소
                </div>

                <div class="popular-place"> <!--피드-->
                    <div class="rank">01</div>
                    <div>
                        <h4 style="font-size: 0.875rem;">판암수족관</h4>
                        <p style="font-size: 0.75rem; color: var(--text-muted);">오늘 1,267 건</p>  <!--TODO. 조회수 구하는 로직 필요-->
                    </div>
                </div>

                <div class="popular-place">
                    <div class="rank">02</div>
                    <div>
                        <h4 style="font-size: 0.875rem;">스마더프로 쇼핑</h4>
                        <p style="font-size: 0.75rem; color: var(--text-muted);">오늘 982건씩</p> 
                    </div>
                </div>

                <div class="popular-place">
                    <div class="rank">03</div>
                    <div>
                        <h4 style="font-size: 0.875rem;">류성준탑</h4>
                        <p style="font-size: 0.75rem; color: var(--text-muted);">오늘 620건험장</p>
                    </div>
                </div>
            </div>

            <div class="widget fancy-widget" style="position: relative; overflow: hidden">  <!--css-->
                <div style="display: flex; gap: 1rem; align-items: flex-start;">

        </aside>
    </div>




    <script> // js
        const placeName = "{{ place_name }}";
        
        // Mock DB connection instead of Real Supabase
        const mockPosts = [
            { id: "1", title: "펜슨 크스: 연실무 덮밥스 키친", content: "오모역 근처가 참말 맛실타입니다. 대전에서 벗 출발하더래요.", author: "대전자", category: placeName, likes: 234, comments: 365, time: "5분전", thumb: "https://via.placeholder.com/150x100?text=Food" },
            { id: "2", title: "소재동 카페거리에서의 여유로운 휴식", content: "대전에서 유명한 카페거리에서 친구들과 즐거운 시간을 보냈어요.", author: "소재동", category: placeName, likes: 187, comments: 600, time: "600m 가면" },
            { id: "3", title: "최고의 뷰맛집", content: "이 근처에서 가장 뷰가 좋은 곳입니다. 강추합니다!", author: "여행자", category: placeName, likes: 156, comments: 490, time: "490m 가면" }
        ];

        const postListEl = document.getElementById('postList');
        
        mockPosts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                ${post.thumb ? `<img src="${post.thumb}" class="post-thumb" alt="thumb">` : ''}
                <div class="post-content" style="flex: 1">
                    <h3>${post.title}</h3>
                    <p>${post.content}</p>
                    <div class="post-meta">
                        <span>${post.author}</span> •
                        <span>${post.time}</span>
                        <span style="margin-left: auto;">👍 ${post.likes}</span>
                        <span>💬 ${post.comments}</span>
                        <span class="badge">${post.category}</span>
                    </div>
                </div>
            `;
            postListEl.appendChild(card);
        });


        // 게시글 작성 버튼 불러옴
        const btn_primary = document.querySelector(".btn-primary")
        const write_modal = document.querySelector("#write-modal")

        btn_primary.addEventListener('click', async(event) => {
            event.preventDefault();
            console.log('게시글 작성 버튼 클릭됨');
            write_modal.style.display = "block";
            write_modal.innerHTML = `
            <form>
                <button id="btn-save">저장</button>
                <input type="text" id="title-user" placeholder="제목을 입력하세요">
                <textarea name="textuser" id="text-user" placeholder="입력해주세요"></textarea>
            <form>
            `
         })



         // 글, 내용을 입력 후 저장 -> app.py에 /user_input를 통해 전송(응답도 받아올것)
         const btn_save = document.querySelector(".btn-save")  //저장 버튼
         const title_user = document.querySelector(".title-user") // 제목
         const text_user = document.querySelector(".text-user") // 내용

         btn_save.addEventListener("click", async(event) =>{
            event.preventDefault();
            const value_title = title_user.value
            const value_text = text_user.value
            console.log('저장 버튼 클릭됨', value_text, value_title);

            //* fetch
            const response = await fetch("/user_input", {  // user_input 어딨니! 
                method : "POST",
                headers : { "Content-Type": "application/json" }, 
                body: JSON.stringify({ 
                "content": value_text, 
                "title": value_title 
                })
                });

                const json_response = await response.json(); // * 받은거
                console.log(json_response);
                }); 

                // 에러 처리 없음 
                // 빈 값 검증 없음




         



    </script>
</body>
</html>
