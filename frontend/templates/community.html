    <!-- *모달 안 작성, 상세(Read), 수정 -->

                <div class="input-group">
                    <label>내용</label>

                    <p style="font-size: 0.8rem; color: #64748b;">파일 선택 시 기존 이미지가 삭제되고 교체됩니다.</p>
                </div>

                    <button id="btn-edit-save" class="btn btn-primary">수정 저장</button>

    <script src="frontend/static/js/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>


    <script> 
//------------------------------------------------------------------------------------------------------------------
        // 1. input 태그 가져오기
        const input_file = document.querySelector('#input-file');
        const input_file_add = document.querySelector('#input-file-add');


        // [ ] 선택된 파일을 담을 변수 (State 역할)
        let selectedFile = null; 

        // 2. 'change' 이벤트 연결
        input_file.addEventListener('change', (e) => {
            // [ ] 파일 데이터가 잘 잡히는지 확인
            const file = e.target.files[0];

            if (file) {
                selectedFile = file; // [ ] 변수(state)에 파일 담기
                console.log("선택된 파일 정보:", selectedFile);
                console.log("파일명:", selectedFile.name);
            }
        });

        // handleUpload 함수
        input_file_add.addEventListener('click', async () => {
            
            // 1. 파일이 선택되었는지 먼저 확인
            if (!selectedFile) {
                alert("먼저 파일을 선택해주세요!");
                return;
            }

            try {
                // [ ] 파일 이름 중복 방지를 위해 현재 시간(밀리초) 준비하기
                // 예: 1715832000000_myphoto.png 형태로 저장됩니다.
                const fileExt = selectedFile.name.split('.').pop(); // 확장자 추출 (png, jpg 등)
                const fileName = `${Date.now()}.${fileExt}`; 

                console.log("업로드 시작할 파일명:", fileName);

                // [ ] supabase.storage.from('내버킷이름').upload(...) 코드 한 줄 적기
                // [ ] await 키워드 잊지 않았는지 체크하기!
                const { data, error } = await supabase.storage
                    .from('avatars') // 👈 중요: 본인이 Supabase에서 만든 '버킷 이름'으로 꼭 바꾸세요!
                    .upload(fileName, selectedFile);

                // [ ] 업로드 성공 후 data와 error 로그 찍어보기
                if (error) {
                    console.error("❌ 업로드 에러 발생:", error.message);
                    alert("업로드 실패: " + error.message);

                } 
                else {
                    console.log("✅ 업로드 성공! 결과 데이터:", data);

                    // [ ] 1. getPublicUrl() 호출해서 이미지 주소 따오기
                    const { data: urlData } = supabase.storage
                        .from('avatars') // 내 버킷 이름 똑같이!
                        .getPublicUrl(fileName); // 아까 만든 파일명 그대로!

                    const publicUrl = urlData.publicUrl;
                    console.log("획득한 이미지 URL:", publicUrl);

                    // [ ] 2. img 태그의 src에 넣어서 화면에 띄워보기
                    // HTML에 <img id="preview-img"> 가 있다고 가정할게요.
                    const myImg = document.querySelector('#preview-img');
                    if (myImg) {
                        myImg.src = publicUrl;
                    }

                    alert("성공! 화면에서 이미지를 확인하세요.");
                }
            } catch (err) {
                console.error("예상치 못한 오류:", err);
            }
        });



        // ==========================================
        // [JavaScript] CSR 로직 및 이벤트 핸들러
        // ==========================================
        let all_feed = [];
        let selected_feed = null;
        let login_user_id = null;
        let is_loading = false;

        const div_feed_list = document.getElementById('postList');
        const div_modal = document.getElementById('div_modal');



// 테스트용 로그인(밑에꺼 살리고 지우면 되는듯)
        window.addEventListener('DOMContentLoaded', async () => {
            login_user_id = "86f71765-646e-4d7c-b4da-0eb270765fd2"; // 로그인 체크 임시 스킵
            await fetchAllFeeds();

            // URL에서 category 읽어서 select 기본값 설정
            const urlParams = new URLSearchParams(window.location.search);
            const categoryFromUrl = urlParams.get('category');
            if (categoryFromUrl) {
                document.getElementById('category-filter').value = categoryFromUrl;
            }
        });

//---------------------------------------------------------------------------------
        // // --- [초기화] DOM 로드 시 로그인 체크 및 데이터 로딩 ---
        // window.addEventListener('DOMContentLoaded', async () => {
        //     // 로그인 체크 (localStorage 사용 시뮬레이션)
        //     const storedUser = localStorage.getItem('login_user_id');
        //     if (!storedUser) {
        //         alert("로그인이 필요합니다."); 
        //         window.location.href = "/"; // 로그인 페이지 리다이렉트
        //         return;
        //     }
        //     login_user_id = storedUser;
        //     console.log("Logged in user:", login_user_id);

        //     // 전체 피드 불러오기
        //     await fetchAllFeeds();
        // });
//---------------------------------------------------------------------------------

        // --- [조회] 서버에서 전체 게시글 불러오기 (GET) ---
        async function fetchAllFeeds() {
            try {
                const res = await fetch('/get_data');
                all_feed = await res.json();
                renderFeedList();
            } catch (err) {
                console.error(err);
                div_feed_list.innerHTML = "피드를 불러오는데 실패했습니다.";
            }
        }

        // 불러온 데이터로 화면 그리기
        function renderFeedList() {
            div_feed_list.innerHTML = '';
            if (all_feed.length === 0) {
                div_feed_list.innerHTML = '<p>게시글이 없습니다.</p>';
                return;
            }
            // 최신순 정렬 (ID 기준 역순 가정)
            const sortedFeeds = [...all_feed].sort((a, b) => b.id - a.id);
            sortedFeeds.forEach(feed => {
                const feedCard = createFeedCard(feed);
                div_feed_list.appendChild(feedCard);
            });
        }

        // 개별 게시글 카드 DOM 생성 함수
        function createFeedCard(feed) {
            const div = document.createElement('div');
            div.className = 'post-card';
            div.id = `feed-${feed.id}`;
            
            // 내용 앞 20자 substring
            const shortContent = feed.content.length > 20 ? feed.content.substring(0, 20) + '...' : feed.content;

            // 이미지가 있으면 태그 생성
            let imgTag = '';
            if (feed.image_url) {
                imgTag = `<img src="${feed.image_url}" alt="image">`;
            }


            // 삭제 버튼 클릭시
            const deleteBtn = String(feed.user_id) === String(login_user_id) 
                ? `<button onclick="event.stopPropagation(); deleteFeed(${feed.id})">삭제</button>` 
                : '';


            div.innerHTML = `
                <h3>${feed.title}</h3>
                <p>${shortContent}</p>
                ${feed.category_code ? `<span>${feed.category_code}</span>` : ''}
                ${imgTag}
                ${deleteBtn}
                
            `;

            // 카드 클릭 시 상세 모달 열기 이벤트 연결
            div.addEventListener('click', () => openDetailModal(feed));
            return div;
        }

        // --- [작성] 게시글 작성 모달 열기 및 저장 (POST) ---
        document.getElementById('btn-open-write').addEventListener('click', () => {
            div_modal.classList.add('show');
            // 작성 영역만 표시하고 나머지는 숨김
            document.getElementById('write-section').classList.remove('hidden');
            document.getElementById('view-section').classList.add('hidden');
            document.getElementById('edit-section').classList.add('hidden');
            
            // 초기화
            document.getElementById('input_title').value = '';
            document.getElementById('input_content').value = '';
            document.getElementById('input_file').value = '';
        });

        // 저장 버튼 클릭 시
        document.getElementById('btn-write-save').addEventListener('click', async () => {
            const title = document.getElementById('input_title').value;
            const content = document.getElementById('input_content').value;
            const fileInput = document.getElementById('input-file');
            const category = document.getElementById('input_category').value; 
            const file = fileInput.files[0];
            if(!title || !content) return alert("제목과 내용을 입력하세요.");

            try {
                let input_img_url = null;
                // 1. 파일이 있다면 Supabase Storage에 업로드
                if (file) {
                    const fileName = `feed/${Date.now()}_${file.name}`;
                    const { data, error } = await supabase.storage.from('images').upload(fileName, file);
                    if (error) throw error;
                    // Public URL 가져오기
                    const { data: publicUrlData } = supabase.storage.from('images').getPublicUrl(fileName);
                    input_img_url = publicUrlData.publicUrl;
                }

                // 2. FastAPI 서버로 게시글 데이터 전송 (POST)
                const res = await fetch('/user_input', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title: title,
                        content: content,
                        user_id: login_user_id,
                        image_url: input_img_url,
                        category_code: category 
                    })
                });
                if(!res.ok) throw new Error("저장 실패");
                
                const newFeed = await res.json();

                // 3. 화면 즉시 갱신 (서버 재요청 없이 리스트 맨 앞에 추가)
                all_feed.push(newFeed);
                const newCard = createFeedCard(newFeed);
                div_feed_list.prepend(newCard); // 맨 앞에 추가
                
                closeModal();

            } catch (err) {
                console.error(err);
                alert("오류 발생: " + err.message);
            }
        });


        // --- [상세보기] 게시글 상세 모달 열기 ---
        function openDetailModal(feed) {
            selected_feed = feed;
            div_modal.classList.add('show');
            
            // 상세보기 영역 표시
            const viewSec = document.getElementById('view-section');
            viewSec.classList.remove('hidden');
            document.getElementById('view_category').innerText = feed.category_code || '';
            document.getElementById('write-section').classList.add('hidden');
            document.getElementById('edit-section').classList.add('hidden');

            document.getElementById('view_title').innerText = feed.title;
            document.getElementById('view_content').innerText = feed.content;
            
            const imgArea = document.getElementById('view_img_area');
            imgArea.innerHTML = feed.image_url ? `<img src="${feed.image_url}" style="max-width:100%; border-radius:8px;">` : '';

            // 작성자 본인 확인 (로그인된 ID와 게시글 작성자 ID 비교)
            const btnEdit = document.getElementById('btn-to-edit');
            // user_id 비교 (문자열 변환하여 비교)
            if (String(feed.user_id) === String(login_user_id)) {
                btnEdit.classList.remove('hidden');
            } else {
                btnEdit.classList.add('hidden');
            }
        }

        // --- [수정] 게시글 수정 모드 진입 및 저장 (PATCH) ---
        document.getElementById('btn-to-edit').addEventListener('click', () => {
            document.getElementById('view-section').classList.add('hidden');
            document.getElementById('edit-section').classList.remove('hidden');

            // 초기값 세팅
            document.getElementById('edit_title').value = selected_feed.title;
            document.getElementById('edit_content').value = selected_feed.content;
            document.getElementById('edit_file').value = '';
        });

        // 수정 취소 (상세보기로 복귀)
        document.getElementById('btn-edit-cancel').addEventListener('click', () => {
            document.getElementById('edit-section').classList.add('hidden');
            document.getElementById('view-section').classList.remove('hidden');
        });

        // 수정 완료 저장
        document.getElementById('btn-edit-save').addEventListener('click', async () => {
            const newTitle = document.getElementById('edit_title').value;
            const newContent = document.getElementById('edit_content').value;
            const newFile = document.getElementById('edit_file').files[0];
            const category = selected_feed.category_code;  // 추가

            try {
                let edit_img_url = selected_feed.image_url;

                // 1. 파일이 변경되었다면: 기존 이미지 삭제 후 새 이미지 업로드
                if (newFile) {
                    // 기존 이미지가 있다면 삭제 시도 (선택 사항, 에러 무시)
                    if (selected_feed.image_url) {
                        try {
                            const oldPath = selected_feed.image_url.split('/public/images/')[1]; // URL 구조에 따라 파싱 필요
                            if(oldPath) {
                                // URL 디코딩 필요할 수 있음
                                const decodedPath = decodeURIComponent(oldPath);
                                await supabase.storage.from('images').remove([decodedPath]);
                            }
                        } catch(e) { console.log("기존 이미지 삭제 실패/무시", e); }
                    }
                    
                    // 새 파일 업로드
                    const fileName = `feed/${Date.now()}_updated_${newFile.name}`;
                    const { error } = await supabase.storage.from('images').upload(fileName, newFile);
                    if (error) throw error;
                    const { data: urlData } = supabase.storage.from('images').getPublicUrl(fileName);
                    edit_img_url = urlData.publicUrl;
                }

                // 2. 서버에 수정 요청 (PATCH)
                const res = await fetch(`/feed/${selected_feed.id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title: newTitle,
                        content: newContent,
                        image_url: edit_img_url,
                        category_code: category 
                    })
                });
                if(!res.ok) throw new Error("수정 실패");

                const updatedFeed = await res.json();

                // 3. 클라이언트 데이터 및 UI 즉시 갱신
                selected_feed = updatedFeed; // 현재 선택된 피드 갱신
                
                // 목록(div_feed_list) 내 해당 카드 갱신
                const oldCard = document.getElementById(`feed-${updatedFeed.id}`);
                if (oldCard) {
                    const newCard = createFeedCard(updatedFeed);
                    div_feed_list.replaceChild(newCard, oldCard);
                }
                
                // 모달 상세 뷰 갱신 후 복귀
                openDetailModal(updatedFeed);

            } catch (err) {
                console.error(err);
                alert("수정 중 오류 발생");
            }
        });

        // --- [공통] 모달 닫기 ---
        document.querySelectorAll('.btn-close-modal').forEach(btn => {
            btn.addEventListener('click', closeModal);
        });

        function closeModal() {
            div_modal.classList.remove('show');
        }

        // 모달 외부 클릭 시 닫기
        window.addEventListener('click', (e) => {
            if (e.target === div_modal) {
                closeModal();
            }
        });


        
        // --- 삭제 ---
        async function deleteFeed(feedId) {
            if (!confirm("삭제하시겠습니까?")) return;
            const res = await fetch(`/feed/${feedId}`, { method: 'DELETE' });
            if (res.ok) {
                document.getElementById(`feed-${feedId}`).remove();
            } else {
                alert("삭제 실패");
            }
        }


    </script>

</body>
</html>
