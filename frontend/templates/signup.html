<body class="login-body">

    <!-- Penguin Mascot -->
    <div class="penguin-container">

        <div class="z-20 w-full max-w-5xl px-6 flex flex-col lg:flex-row items-center justify-center gap-12 lg:gap-24">
            <!-- Updated Adélie Character Side -->
            <div class="flex flex-col items-center text-center max-w-sm animate-float">
            <div class="relative group">
                <!-- Improved Adélie Penguin SVG with Realistic Features -->
                <svg class="penguin-shadow transition-transform duration-500 group-hover:scale-105" height="280" viewbox="0 0 240 280" width="240" xmlns="http://www.w3.org/2000/svg">

                <!-- Flippers -->
                <path d="M45 130C25 140 15 170 20 190C25 210 50 170 60 150" fill="#111D21"></path>
                <path d="M195 130C215 140 225 170 220 190C215 210 190 170 180 150" fill="#111D21"></path>
                <!-- Head Details -->
                <!-- Characteristic White Eye Rings -->
                <circle cx="100" cy="85" fill="white" r="10"></circle>
                <circle cx="140" cy="85" fill="white" r="10"></circle>
                <!-- Pupils -->

                <circle cx="138" cy="85" fill="#111D21" r="5"></circle>

                <path d="M100 255C85 255 80 265 85 270L105 270L105 255Z" fill="#2C2C2C"></path>
                <path d="M140 255C155 255 160 265 155 270L135 270L135 255Z" fill="#2C2C2C"></path>
        </svg>
        <!-- Blush for "Cute Appeal" -->
        <div class="absolute top-[105px] left-[85px] w-4 h-2 bg-pink-300/30 rounded-full blur-[2px]"></div>
            <div class="absolute top-[105px] right-[85px] w-4 h-2 bg-pink-300/30 rounded-full blur-[2px]"></div>
        </div>
        <div class="mt-8 space-y-4">
            <div class="bg-white px-8 py-4 rounded-3xl shadow-xl border border-primary inline-block relative">
                <p class="text-xl font-extrabold text-slate-800">안녕! 난 아델리🐧</p>
                <div class="text-slate-600 font-medium">같이 대전 탐험가지 않을래?</div>
                <!-- Chat bubble tail -->
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border-l border-t border-primary rotate-45 rounded-sm"></div>
            </div>
        </div>
        </div>
        </div>
    </div>

    <!-- Signup Form -->
    <div class="login-card">
        <h1>Daejeon</h1>
        <p class="subtitle">Arctic Project - Sign Up</p>

        <form class="login-form" id="signupForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="이메일" required>
            </div>
            <div class="input-group">
                <input type="text" id="nickname" placeholder="닉네임" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="비밀번호 (최소 6자)" required minlength="6">
            </div>
            <div class="input-group">
                <input type="password" id="passwordConfirm" placeholder="비밀번호 확인" required>
            </div>
            <button type="submit" class="btn-primary">회원가입 →</button>
        </form>

        <div class="social-login">
            <p>ALREADY HAVE AN ACCOUNT?</p>
            <a href="/" class="signup-link">로그인 (Sign In)</a>
        </div>
    </div>

<script>
    // 환경변수 전달
    window.SUPABASE_URL = "{{ supabase_url }}";
    window.SUPABASE_KEY = "{{ supabase_key }}";
</script>
<script src="/static/js/auth.js"></script>
<script>
    // 회원가입 폼 이벤트
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const nickname = document.getElementById('nickname').value;
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        
        // 비밀번호 확인
        if (password !== passwordConfirm) {
            alert('❌ 비밀번호가 일치하지 않습니다!');
            return;
        }
        
        try {
            // auth.js의 signup 함수 사용!
            const authData = await signup(email, password, nickname);
            
            // 이메일 인증 여부에 따른 메시지 분기
            if (authData.user && authData.session === null) {
                alert('📧 인증 메일이 발송되었습니다! 메일함을 확인하여 가입을 완료해 주세요.');
                window.location.href = '/';
            } else {
                alert('✅ 회원가입 성공! 이제 서비스를 이용하실 수 있습니다.');
                window.location.href = '/map';
            }
            
        } catch (error) {
            let msg = error.message;
            // 주요 에러 메시지 한국어 변환
            if (msg.includes("already registered")) {
                msg = "이미 가입된 이메일입니다.";
            } else if (msg.includes("Password should be at least")) {
                msg = "비밀번호는 최소 6자 이상이어야 합니다.";
            } else if (msg.includes("Invalid email")) {
                msg = "유효하지 않은 이메일 형식입니다.";
            }
            
            alert('❌ 회원가입 실패: ' + msg);
            console.error('에러 상세:', error);
        }
    });
</script>
</body>
</html>
