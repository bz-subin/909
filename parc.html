<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2094f3",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">

<main class="flex-1 relative bg-slate-100">
<!-- The Info Popup / Speech Bubble -->
<div class="mb-4 bg-white dark:bg-slate-900 rounded-2xl shadow-xl w-80 overflow-hidden border border-slate-200 dark:border-slate-800 animate-in fade-in slide-in-from-bottom-4 duration-300">
<div class="h-32 w-full bg-cover bg-center" data-alt="Wide shot of Starfield Library bookshelves" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAzT9v7uby_3wBkPlX3blwqxfZcMSLji7AzlaYdf1_GS7TPz3v2NRZOScZO9CtmtidOoehnzzW-emvXJ26pWET2LiaFnxIcXxn2eWu4lHry1qTUW3rM3cB5cZDFqmS2QsWI7GZZn0htZAFACLbKdu52ICZhMMR9eR6X3NGpEHCHn3R3butXUJeB9etCaRLpcjnHacehua-okQ0VitGYJo9_w_qMgxfJemWBD7R8hecsizRUDB58OaTmMGiCb8OHFLH_RUfJkHg8XhFU');"></div>
<div class="p-5">
<div class="flex justify-between items-start mb-2">
<h4 class="text-lg font-bold">Starfield Library</h4>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed mb-4">
                                        A futuristic public library located in the center of COEX Mall, featuring towering bookshelves and a cozy atmosphere.
                                    </p>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
<span>커뮤니티로 이동</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
<!-- Tail of speech bubble -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white dark:bg-slate-900 rotate-45 border-r border-b border-slate-200 dark:border-slate-800"></div>
</div>
</main>
</body>
</html>
